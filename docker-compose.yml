version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: sims-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sims_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_in_production}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sims_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sims-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: sims-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-changeme_in_production}@db:5432/sims_db?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-secure-random-string-64-chars-min}
      JWT_EXPIRY: 24h
      CORS_ORIGINS: ${CORS_ORIGINS:-https://your-domain.com}
      THROTTLE_TTL: 60000
      THROTTLE_LIMIT: 60
      HELMET_ENABLED: "true"
      COMPRESSION_ENABLED: "true"
      LOG_LEVEL: warn
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health/liveness"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: sims-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:3001/api
      NEXT_PUBLIC_APP_NAME: SIMS-ERP
    ports:
      - "3000:3000"

  nginx:
    image: nginx:alpine
    container_name: sims-nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  backup:
    image: postgres:16-alpine
    container_name: sims-backup
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: ${DB_PASSWORD:-changeme_in_production}
    volumes:
      - ./backups:/backups
      - ./scripts/backup.sh:/backup.sh
    entrypoint: ["sh", "/backup.sh"]
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
